<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ポケモン図鑑</title>
    <!-- css -->
    <link rel="stylesheet" href="./css/style.css">
    <!--font-awesomeの読み込み-->
    <link href="https://use.fontawesome.com/releases/v6.6.0/css/all.css" rel="stylesheet">
    <!-- googleフォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Dela+Gothic+One&family=DotGothic16&family=Inria+Sans:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Kaisei+Decol:wght@400;500;700&family=Kaisei+HarunoUmi&family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Kiwi+Maru&family=Kosugi+Maru&family=M+PLUS+Rounded+1c:wght@400;700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&family=Zen+Kurenaido&family=Zen+Maru+Gothic:wght@300;400;500;700;900&display=swap"
        rel="stylesheet">
</head>

<body id="list-top">
    <div class="wrap">
        <div class="bg"></div>
    </div>

    <div class="wrap2">
        <header class="header-wrapper list-header-wrapper">
            <a href="./index.html" class="logo-img">
                <img src="./img/logo.png" alt="ロゴ">
            </a>

            <!-- 検索窓 -->
            <form id="searchForm" action="/" method="get">
                <div class="search-box list-search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" name="query" placeholder="ポケモンの名前で検索">
                </div>
            </form><!-- end form -->

            <!-- ハンバーガーメニューアイコン -->
            <button id="menu-toggle" class="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <!-- メニュー本体 -->
            <nav id="side-menu" class="side-menu dotgothic16-regular">
                <div class="nav-flex">
                    <ul class="main-nav">
                        <li><a href="./index.html"><span class="cursol">▶ </span>ホーム</a></li>
                        <li><a href="./list.html"><span class="cursol">▶ </span>図鑑</a></li>
                    </ul>
                </div>
            </nav>
        </header><!-- end header-wrapper -->
        <main>
            <div class="center">
                <!-- タイトル -->
                <div class="list-title dotgothic16-regular">
                    <h2>１５１ずかん</h2>
                    <hr>
                </div><!-- end タイトル -->

                <!-- タイプ -->
                <div id="typeButtons" class="type-buttons button-reset">
                    <button data-type="normal" id="normal">ノーマル</button>
                    <button data-type="fire" id="fire">ほのお</button>
                    <button data-type="water" id="water">みず</button>
                    <button data-type="grass" id="grass">くさ</button>
                    <button data-type="electric" id="electric">でんき</button>
                    <button data-type="ice" id="ice">こおり</button>
                    <button data-type="fighting" id="fighting">かくとう</button>
                    <button data-type="poison" id="poison">どく</button>
                    <button data-type="ground" id="ground">じめん</button>
                    <br>
                    <button data-type="flying" id="flying">ひこう</button>
                    <button data-type="psychic" id="psychic">エスパー</button>
                    <button data-type="bug" id="bug">むし</button>
                    <button data-type="rock" id="rock">いわ</button>
                    <button data-type="ghost" id="ghost">ゴースト</button>
                    <button data-type="dragon" id="dragon">ドラゴン</button>
                    <button data-type="dark" id="dark">あく</button>
                    <button data-type="steel" id="steel">はがね</button>
                    <button data-type="fairy" id="fairy">フェアリー</button>
                </div>

                <!-- クリアボタン -->
                <div id="clearButton" class="clear-button button-reset">
                    <button>絞り込みクリア</button>
                </div>

                <!-- ポケモン一覧 -->
                <div class="pokemon-list" id="pokemonList"></div>

                <!-- モーダルウィンドウ -->
                <div class="modal" id="pokemonModal">
                    <div class="modal-content">
                        <i class="fa-solid fa-xmark close-modal" id="closeModal"></i>
                        <div class="modal-image">
                            <img id="modalImage" src="" alt="ポケモン画像">
                            <div class="modal-wrapper">
                                <p id="modalNo"></p>
                                <h2 id="modalTitle"></h2>
                                <p id="modalTypes"></p>
                                <p id="modalDescription"></p>
                            </div>
                        </div>
                    </div>
                </div>

            </div><!-- end center -->
        </main><!-- end main -->

        <footer class="footer-wrapper">
            <!-- 上に戻るボタン -->
            <a href="#list-top">
                <div class="list-top-btn">
                    <i class="fa-solid fa-chevron-up"></i>
                </div><!-- end list-top-btn -->
            </a>

            <div class="footer-wrapper">
                <div class="footer-content dotgothic16-regular">
                    <p>&copy; pokemon図鑑</p>
                </div>
            </div>
        </footer><!-- end フッター -->

    </div>
    <!-- JavaScript読み込み -->
    <script src="./JS/list.js"></script>
    <script src="./JS/script.js"></script>
</body><!-- end body-wraper -->

</html>
